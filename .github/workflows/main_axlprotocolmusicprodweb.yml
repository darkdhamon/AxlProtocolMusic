# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - axlprotocolmusicprodweb

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      PROJECT_PATH: AxlProtocolMusic/AxlProtocolMusic.WebApp/AxlProtocolMusic.WebApp.csproj
      PUBLISH_PATH: ${{ github.workspace }}/published-app
      RUNTIME_IDENTIFIER: win-x86
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build with dotnet
        run: dotnet build "${{ env.PROJECT_PATH }}" --configuration Release -r "${{ env.RUNTIME_IDENTIFIER }}"

      - name: dotnet publish
        run: dotnet publish "${{ env.PROJECT_PATH }}" -c Release -r "${{ env.RUNTIME_IDENTIFIER }}" --self-contained true -o "${{ env.PUBLISH_PATH }}"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{ env.PUBLISH_PATH }}

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_6D33BC55E1EF4B19A72BCABC6242866C }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_24BCD474BAD44054A80901DF57EC4392 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_9E23FAE2FAC248E5A2F10EE8A8894CF5 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'axlprotocolmusicprodweb'
          slot-name: 'Production'
          package: .
          
