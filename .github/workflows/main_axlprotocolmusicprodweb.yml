# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - axlprotocolmusicprodweb

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      PROJECT_PATH: AxlProtocolMusic/AxlProtocolMusic.WebApp/AxlProtocolMusic.WebApp.csproj
      # Integration tests live in AxlProtocolMusic.WebApp.IntegrationTests and are intentionally excluded for now.
      TEST_PROJECT_PATH: AxlProtocolMusic/AxlProtocolMusic.WebApp.Tests/AxlProtocolMusic.WebApp.Tests.csproj
      TEST_RESULTS_DIR: ${{ github.workspace }}/AxlProtocolMusic/TestResults/UnitTests
      PUBLISH_PATH: ${{ github.workspace }}/published-app
      COVERAGE_OUTPUT_DIR: ${{ github.workspace }}/AxlProtocolMusic/TestResults/Coverage
      COVERAGE_OUTPUT_PREFIX: ${{ github.workspace }}/AxlProtocolMusic/TestResults/Coverage/coverage
      COVERAGE_PACKAGE_NAME: 'AxlProtocolMusic.WebApp'
      COVERAGE_WARNING_THRESHOLD: '90'
      COVERAGE_FAIL_THRESHOLD: '65'
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v5

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore "${{ env.TEST_PROJECT_PATH }}"

      - name: Build with dotnet
        run: dotnet build "${{ env.TEST_PROJECT_PATH }}" --configuration Release --no-restore

      - name: Run unit tests with coverage
        id: tests
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:TEST_RESULTS_DIR | Out-Null
          $testLogPath = Join-Path $env:TEST_RESULTS_DIR 'dotnet-test.log'
          $testOutput = dotnet test "${{ env.TEST_PROJECT_PATH }}" `
            --configuration Release `
            --no-build 2>&1 | Tee-Object -FilePath $testLogPath
          $exitCode = $LASTEXITCODE

          if ($exitCode -ne 0) {
            $message = "Unit tests failed. Review the dotnet-test.log artifact for details."
            $summaryLine = $testOutput | Select-String -Pattern 'Failed:\s*\d+,\s*Passed:\s*\d+,\s*Skipped:\s*\d+,\s*Total:\s*\d+' | Select-Object -Last 1
            $platformLogPath = $testOutput |
              Select-String -Pattern "Tests failed:\s*'([^']+\.log)'" |
              ForEach-Object { $_.Matches[0].Groups[1].Value } |
              Select-Object -Last 1

            if ($summaryLine) {
              $message = "Unit tests failed. $($summaryLine.Matches[0].Value). Review the dotnet-test.log artifact for details."
            }

            "failed=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "message=$message" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

            Write-Host "::error::$message"
            $message | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

            if ($platformLogPath -and (Test-Path $platformLogPath)) {
              $copiedPlatformLogPath = Join-Path $env:TEST_RESULTS_DIR 'testing-platform.log'
              Copy-Item -Path $platformLogPath -Destination $copiedPlatformLogPath -Force

              $platformLogContent = Get-Content -Path $platformLogPath
              $failedTests = $platformLogContent |
                Select-String -Pattern '^\s*failed\s+(.+?)\s+\(' |
                ForEach-Object { $_.Matches[0].Groups[1].Value.Trim() }

              if ($failedTests.Count -gt 0) {
                "Failed tests:" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
                foreach ($failedTest in $failedTests) {
                  "- $failedTest" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
                  Write-Host "::error::Failed test: $failedTest"
                }
              }

              $failureDetails = New-Object System.Collections.Generic.List[string]
              $currentBlock = New-Object System.Collections.Generic.List[string]
              $capturingBlock = $false

              foreach ($line in $platformLogContent) {
                if ($line -match '^\s*failed\s+') {
                  if ($capturingBlock -and $currentBlock.Count -gt 0) {
                    $failureDetails.Add(($currentBlock -join [Environment]::NewLine))
                    $currentBlock.Clear()
                  }

                  $capturingBlock = $true
                  $currentBlock.Add($line)
                  continue
                }

                if ($capturingBlock) {
                  if ($line -match '^(passed|skipped)\s+' -or
                      $line -match '^NUnit Adapter' -or
                      $line -match '^Test run summary:' -or
                      $line -match '^=== COMMAND LINE ===') {
                    if ($currentBlock.Count -gt 0) {
                      $failureDetails.Add(($currentBlock -join [Environment]::NewLine))
                      $currentBlock.Clear()
                    }

                    $capturingBlock = $false
                    continue
                  }

                  $currentBlock.Add($line)
                }
              }

              if ($capturingBlock -and $currentBlock.Count -gt 0) {
                $failureDetails.Add(($currentBlock -join [Environment]::NewLine))
              }

              if ($failureDetails.Count -gt 0) {
                "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
                "Failure details:" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
                foreach ($detail in $failureDetails) {
                  '```text' | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
                  $detail | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
                  '```' | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
                }
              }
            }

            exit 0
          }

          "failed=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "Unit tests passed." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

      - name: Evaluate coverage thresholds
        id: coverage
        if: ${{ always() && steps.tests.outputs.failed != 'true' }}
        shell: pwsh
        run: |
          $coveragePath = Join-Path $env:COVERAGE_OUTPUT_DIR 'coverage.cobertura.xml'
          if (-not (Test-Path $coveragePath)) {
            $message = "Coverage report not found at $coveragePath."
            "failed=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "message=$message" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            $message | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
            exit 0
          }

          [xml]$coverage = Get-Content $coveragePath
          $package = $coverage.coverage.packages.package | Where-Object { $_.name -eq $env:COVERAGE_PACKAGE_NAME } | Select-Object -First 1
          if ($null -eq $package) {
            $message = "Coverage package '$($env:COVERAGE_PACKAGE_NAME)' was not found in $coveragePath."
            "failed=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "message=$message" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            $message | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
            exit 0
          }

          $lineRate = [math]::Round(([double]$package.'line-rate' * 100), 2)
          $warningThreshold = [double]$env:COVERAGE_WARNING_THRESHOLD
          $failThreshold = [double]$env:COVERAGE_FAIL_THRESHOLD

          "Coverage package: $($env:COVERAGE_PACKAGE_NAME)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "Line coverage: $lineRate%" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "Warning threshold: $warningThreshold%" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          "Fail threshold: $failThreshold%" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

          if ($lineRate -lt $warningThreshold) {
            Write-Host "::warning::Line coverage for $($env:COVERAGE_PACKAGE_NAME) is $lineRate%, below the warning threshold of $warningThreshold%."
          }

          if ($lineRate -lt $failThreshold) {
            $message = "Line coverage for $($env:COVERAGE_PACKAGE_NAME) is $lineRate%, below the fail threshold of $failThreshold%."
            "failed=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "message=$message" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            $message | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
            exit 0
          }

          "failed=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Fail build with clear reason
        if: always()
        shell: pwsh
        run: |
          $messages = @()

          if ("${{ steps.tests.outputs.failed }}" -eq "true") {
            $messages += "${{ steps.tests.outputs.message }}"
          }

          if ("${{ steps.coverage.outputs.failed }}" -eq "true") {
            $messages += "${{ steps.coverage.outputs.message }}"
          }

          if ($messages.Count -gt 0) {
            exit 1
          }

      - name: dotnet publish
        if: ${{ steps.tests.outputs.failed != 'true' && steps.coverage.outputs.failed != 'true' }}
        run: dotnet publish "${{ env.PROJECT_PATH }}" -c Release --no-build -o "${{ env.PUBLISH_PATH }}"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: |
            ${{ env.COVERAGE_OUTPUT_DIR }}/coverage.json
            ${{ env.COVERAGE_OUTPUT_DIR }}/coverage.cobertura.xml
            ${{ env.TEST_RESULTS_DIR }}/**/*

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v6
        with:
          name: .net-app
          path: ${{ env.PUBLISH_PATH }}

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v7
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_6D33BC55E1EF4B19A72BCABC6242866C }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_24BCD474BAD44054A80901DF57EC4392 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_9E23FAE2FAC248E5A2F10EE8A8894CF5 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'axlprotocolmusicprodweb'
          slot-name: 'Production'
          package: .
          
